# Backup configuration
DB_NAME=school_bot_db
DB_USER=max
DB_HOST=localhost
DB_PORT=5432
DB_PASSWORD=

BACKUP_DIR=/var/backups/bot
BACKUP_TMP=/tmp/bot_backup_tmp

# Comma-separated paths to include (optional)
# Example: /opt/bot/.env,/opt/bot/covers,/opt/bot/photos
BACKUP_PATHS=/Users/max/PycharmProjects/School_bot/.env,/Users/max/PycharmProjects/School_bot/covers,/Users/max/PycharmProjects/School_bot/photos

# Retention counts
KEEP_DAILY=7
KEEP_WEEKLY=4
KEEP_MONTHLY=3

# Telegram notifications
TELEGRAM_BOT_TOKEN=
TELEGRAM_CHAT_ID=
SEND_TELEGRAM_FILE=false
