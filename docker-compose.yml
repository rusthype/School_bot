services:
  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - internal
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      ALOCHI_DB_URL: ${ALOCHI_DB_URL}
    working_dir: /app
    depends_on:
      redis:
        condition: service_started
    volumes:
      - ./logs:/app/logs
      - ./photos:/app/photos
      - ./covers:/app/covers
    networks:
      - internal
      - alochi

networks:
  internal:
    driver: bridge
  alochi:
    external: true
    name: infrastructure_default
