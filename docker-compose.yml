services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-school_bot_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d school_bot_db"]
      interval: 5s
      timeout: 5s
      retries: 10
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./photos:/app/photos
      - ./covers:/app/covers
volumes:
  postgres_data:
